<!DOCTYPE html>
<html>
<head>
  <title>Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="login-bg">
<style>
.login-bg {
  height: 100vh;
  background: url('https://images.unsplash.com/photo-1522202176988-66273c2fd55f') no-repeat center center/cover;
  display: flex;
  justify-content: center;   /* horizontal center */
  align-items: center;       /* vertical center */
}
.glass-card {
  background: rgba(134, 21, 199, 0.619);
  backdrop-filter: blur(10px);
  border-radius: 15px;
  padding: 30px;
  color: white;
}
input {
  background: rgba(55, 202, 82, 0.8) !important;
}
button:hover {
  transform: scale(1.05);
  transition: 0.3s;
}
</style>
<div >
  <div class="glass-card shadow" style="width:350px;">
    <div class="card-body">
      <h3 class="text-center mb-4 text-white">Login</h3>
      <input type="email" id="email" class="form-control mb-3" placeholder="Email">
      <input type="password" id="password" minlength="8" class="form-control mb-3" placeholder="Password">
      <button class="btn btn-primary w-100" onclick="login()">Login</button>
      <p class="text-center mt-3">
        Don't have account? <a href="register.html" style="color: violet;">Register</a>
      </p>
    </div>
  </div>
</div>

<script>
async function login(){

let email = document.getElementById("email").value;
let password = document.getElementById("password").value;

let response = await fetch("http://localhost:3000/login",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body: JSON.stringify({email,password})
});
let data = await response.json();
if(data.token){
  localStorage.setItem("token", data.token);
  window.location.href = "index.html"; // go to dashboard
}else{
  alert(data.message);
}
}
</script>
</body>
</html>
