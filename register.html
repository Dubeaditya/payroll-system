<!DOCTYPE html>
<html>
<head>
  <title>Register</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body style="background: #f5f5f5;">
<div class="container mt-5">
  <div class="card shadow mx-auto" style="max-width:400px;">
    <div class="card-body">
      <h3 class="text-center mb-4">Register</h3>
      <input type="text" id="name" class="form-control mb-3" placeholder="Name">
      <input type="email" id="email" class="form-control mb-3" placeholder="Email">
      <input type="password" id="password" class="form-control mb-3" placeholder="Password">
      <button class="btn btn-success w-100" onclick="register()">Register</button>
      <p class="text-center mt-3">
        Already have account? <a href="login.html">Login</a>
      </p>
    </div>
  </div>
</div>
<script>
async function register(){

let name = document.getElementById("name").value.trim();
let email = document.getElementById("email").value.trim();
let password = document.getElementById("password").value.trim();

if(!name || !email || !password){
  alert("All fields are required");
  return;
}
if(password.length < 8){
  alert("Password must be at least 8 characters");
  return;
}
let response = await fetch("http://localhost:3000/register",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body: JSON.stringify({name,email,password})
});
let data = await response.json();
alert(data.message);
window.location.href = "login.html";
}
</script>
</body>
</html>
